<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyllene – Voice Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="screen">

      <!-- ── hero heading ───────────────────────── -->
      <div class="hero">
        <h1 class="moon-title">Cyllene</h1>
      </div>


      <!-- ── radial visualizer ─────────────────── -->
      <div class="viz-wrap">
        <canvas id="vizCanvas"></canvas>
        <p class="wave-hint" id="waveHint">What can I help you with?</p>

        <div class="mic-wrap">
          <button class="mic-btn" id="micButton" aria-label="Push to speak">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
            </svg>
          </button>
          <p class="mic-label">push to speak</p>
        </div>
        <div class="type-row">
          <input id="textInput" type="text" placeholder="Or type here if voice isn’t available…" autocomplete="off" />
          <button class="send-btn" id="sendBtn" type="button" aria-label="Send">Send</button>
        </div>
      </div>

    </div>

    <script src="./app.js"></script>
  </body>
</html>
